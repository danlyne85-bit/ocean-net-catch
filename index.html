<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌊 Ocean Net Catch!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#001a33; font-family:'Comic Sans MS','Chalkboard SE',cursive; user-select:none; touch-action:none; }
canvas { display:block; cursor:crosshair; touch-action:none; }
#dex-btn {
  position:absolute; top:14px; left:14px;
  width:60px; height:60px; border-radius:50%;
  background:linear-gradient(135deg,#FF6B6B,#FF8E53);
  border:3px solid #FFD700; cursor:pointer; font-size:28px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 18px rgba(255,107,107,.5);
  transition:transform .15s; z-index:10;
  -webkit-tap-highlight-color:transparent;
}
#dex-btn:hover { transform:scale(1.12); }
#dex-btn:active { transform:scale(0.95); }
#pw-screen {
  position:fixed; inset:0; z-index:999;
  background:linear-gradient(180deg,#001a33 0%,#003366 60%,#001a33 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
}
#pw-screen h1 { color:#FFD700; font-size:clamp(28px,6vw,52px); text-shadow:0 0 20px rgba(255,215,0,.6); }
#pw-screen p  { color:#81D4FA; font-size:clamp(14px,3vw,20px); }
#pw-screen input {
  padding:14px 22px; font-size:clamp(16px,4vw,22px);
  border-radius:30px; border:3px solid #0288D1;
  background:rgba(0,0,0,.4); color:#fff; text-align:center;
  outline:none; width:min(280px,80vw);
  font-family:inherit;
}
#pw-screen input::placeholder { color:#4FC3F7; }
#pw-screen button {
  padding:14px 36px; font-size:clamp(16px,4vw,22px);
  border-radius:30px; border:none; cursor:pointer;
  background:linear-gradient(135deg,#0288D1,#01579B);
  color:#fff; font-family:inherit;
  box-shadow:0 4px 18px rgba(2,136,209,.5);
  transition:transform .15s;
}
#pw-screen button:hover { transform:scale(1.07); }
#pw-screen button:active { transform:scale(0.95); }
#pw-error { color:#FF5252; font-size:clamp(13px,3vw,18px); min-height:24px; }
#name-modal {
  display:none; position:fixed; inset:0; z-index:998;
  background:rgba(0,8,25,.92);
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#name-modal h2 { color:#FFD700; font-size:clamp(24px,5vw,42px); text-shadow:0 0 18px rgba(255,215,0,.6); }
#name-modal .nm-score { color:#7ee8ff; font-size:clamp(18px,4vw,30px); }
#name-modal p  { color:#81D4FA; font-size:clamp(13px,3vw,18px); }
#name-modal input {
  padding:13px 20px; font-size:clamp(15px,4vw,22px);
  border-radius:28px; border:3px solid #FFD700;
  background:rgba(0,0,0,.45); color:#fff; text-align:center;
  outline:none; width:min(260px,78vw); font-family:inherit;
}
#name-modal input::placeholder { color:#4FC3F7; }
.nm-row { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.nm-btn {
  padding:12px 28px; font-size:clamp(14px,3.5vw,20px);
  border-radius:28px; border:none; cursor:pointer;
  font-family:inherit; transition:transform .15s;
}
.nm-btn:active { transform:scale(0.95); }
#nm-submit { background:linear-gradient(135deg,#FFD700,#FF8C00); color:#000; font-weight:bold; }
#nm-skip   { background:rgba(255,255,255,.12); color:#aaa; }
#lb-btn {
  position:absolute; top:14px; right:80px;
  width:60px; height:60px; border-radius:50%;
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  border:3px solid #fff; cursor:pointer; font-size:28px;
  display:none; align-items:center; justify-content:center;
  box-shadow:0 4px 18px rgba(255,180,0,.5);
  transition:transform .15s; z-index:10;
  -webkit-tap-highlight-color:transparent;
}
#lb-btn:hover { transform:scale(1.12); }
#lb-btn:active { transform:scale(0.95); }
</style>
</head>
<body>
<div id="pw-screen">
  <h1>🌊 Ocean Net Catch</h1>
  <p>Enter password to play</p>
  <input id="pw-input" type="password" placeholder="Password" autocomplete="off" />
  <button id="pw-btn">Dive In!</button>
  <div id="pw-error"></div>
</div>
<div id="name-modal">
  <h2>🏆 Stage Complete!</h2>
  <div class="nm-score">Final Score: <span id="nm-score-val">0</span></div>
  <p>Enter your name for the leaderboard:</p>
  <input id="nm-input" type="text" placeholder="Your name" maxlength="16" autocomplete="off" />
  <div class="nm-row">
    <button class="nm-btn" id="nm-submit">Submit Score 🏆</button>
    <button class="nm-btn" id="nm-skip">Skip</button>
  </div>
</div>
<canvas id="c" style="display:none"></canvas>
<button id="dex-btn" title="Ocean Dex (P)" style="display:none">📖</button>
<button id="lb-btn" title="Leaderboard">🏆</button>
<script>
'use strict';
(function(){
  const PW='ocean123';
  function unlock(){
    document.getElementById('pw-screen').style.display='none';
    document.getElementById('c').style.display='block';
    document.getElementById('dex-btn').style.display='flex';
    document.getElementById('lb-btn').style.display='flex';
  }
  function tryPassword(){
    const val=document.getElementById('pw-input').value;
    if(val===PW){ unlock(); }
    else{
      const err=document.getElementById('pw-error');
      err.textContent='Wrong password. Try again!';
      document.getElementById('pw-input').value='';
      document.getElementById('pw-input').focus();
      setTimeout(()=>{ err.textContent=''; },2000);
    }
  }
  document.getElementById('pw-btn').addEventListener('click',tryPassword);
  document.getElementById('pw-input').addEventListener('keydown',e=>{ if(e.key==='Enter') tryPassword(); });
  document.getElementById('pw-input').focus();
})();
/* ═══════════════════════════════════════════════════════════════════════════
   OCEAN NET CATCH  —  Enhanced Edition
   ── HOW TO CONFIGURE ─────────────────────────────────────────────────────
   All tunable values live in the CFG object below.
   Stage pools, speeds, and challenge targets are in the STAGES array.
   Rarity spawn weights are in CFG.weights (higher = more common).
   ═══════════════════════════════════════════════════════════════════════════ */

const CFG = {
  netSpeed        : 13,    // pixels/frame the net travels
  netMaxRadius    : 54,    // maximum net spread (px)
  netLifetime     : 62,    // frames before net vanishes
  spawnBase       : 88,    // frames between spawns at stage start
  spawnMin        : 36,    // fastest spawn rate (later stages)
  maxOnScreen     : 13,    // max concurrent live creatures
  weights: {               // relative spawn chance per rarity
    common    : 42,
    uncommon  : 26,
    rare      : 16,
    epic      :  8,
    legendary :  3,        // set 0 to prevent legendaries
  },
};

/* ─── Canvas ─────────────────────────────────────────────────────────────── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

/* ═══════════════════════════════════════════════════════════════════════════
   CREATURE DRAW FUNCTIONS  —  all centered at (0,0), facing RIGHT
   ═══════════════════════════════════════════════════════════════════════════ */

function drawClownfish(c) {
  // tail
  c.fillStyle='#E64A19';
  c.beginPath();c.moveTo(22,0);c.lineTo(38,-17);c.lineTo(38,17);c.closePath();c.fill();
  // body
  c.fillStyle='#FF6D00';
  c.beginPath();c.ellipse(-1,0,23,15,0,0,Math.PI*2);c.fill();
  // white stripes
  c.fillStyle='#FFF';
  c.beginPath();c.ellipse(-10,0,4,14,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(5,0,3.5,13,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#222';c.lineWidth=1.2;
  c.beginPath();c.ellipse(-10,0,4,14,0,0,Math.PI*2);c.stroke();
  c.beginPath();c.ellipse(5,0,3.5,13,0,0,Math.PI*2);c.stroke();
  // dorsal fin
  c.fillStyle='#FF6D00';
  c.beginPath();c.moveTo(-13,-13);c.lineTo(8,-13);c.lineTo(6,-7);c.lineTo(-11,-7);c.closePath();c.fill();
  // pectoral fin
  c.fillStyle='#FF8F00';
  c.beginPath();c.ellipse(2,9,8,5,-0.4,0,Math.PI*2);c.fill();
  // eye
  c.fillStyle='#FFF';c.beginPath();c.arc(-16,-5,5.5,0,Math.PI*2);c.fill();
  c.fillStyle='#111';c.beginPath();c.arc(-15,-5,3,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-14,-6,1.3,0,Math.PI*2);c.fill();
  // outline
  c.strokeStyle='#BF360C';c.lineWidth=1.5;
  c.beginPath();c.ellipse(-1,0,23,15,0,0,Math.PI*2);c.stroke();
}

function drawPufferfish(c) {
  // spines first (behind body)
  c.strokeStyle='#558B2F';c.lineWidth=2;
  for(let i=0;i<10;i++){
    const a=(Math.PI*2/10)*i;
    c.beginPath();c.moveTo(Math.cos(a)*18,Math.sin(a)*18);
    c.lineTo(Math.cos(a)*28,Math.sin(a)*28);c.stroke();
  }
  // body
  const bg=c.createRadialGradient(-4,-4,2,0,0,20);
  bg.addColorStop(0,'#FFF9C4');bg.addColorStop(1,'#F9A825');
  c.fillStyle=bg;
  c.beginPath();c.arc(0,0,20,0,Math.PI*2);c.fill();
  // spots
  c.fillStyle='rgba(100,120,0,.25)';
  [[5,5,5],[-7,2,4],[3,-8,4],[8,-3,3]].forEach(([x,y,r])=>{
    c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  });
  // eyes (big cute)
  c.fillStyle='#FFF';c.beginPath();c.arc(-10,-7,7,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(5,-10,6,0,Math.PI*2);c.fill();
  c.fillStyle='#222';c.beginPath();c.arc(-9,-7,4,0,Math.PI*2);c.fill();
  c.fillStyle='#222';c.beginPath();c.arc(6,-10,3.5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-8,-8,1.5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(7,-11,1.3,0,Math.PI*2);c.fill();
  // mouth
  c.strokeStyle='#E65100';c.lineWidth=2;
  c.beginPath();c.arc(2,8,5,0.2,Math.PI-0.2);c.stroke();
  c.strokeStyle='#333';c.lineWidth=1.5;
  c.beginPath();c.arc(0,0,20,0,Math.PI*2);c.stroke();
}

function drawBlueTang(c) {
  // tail (yellow)
  c.fillStyle='#FDD835';
  c.beginPath();c.moveTo(24,0);c.lineTo(40,-16);c.lineTo(40,16);c.closePath();c.fill();
  c.fillStyle='#F9A825';
  c.beginPath();c.moveTo(22,0);c.lineTo(36,-10);c.lineTo(36,10);c.closePath();c.fill();
  // body
  c.fillStyle='#1565C0';
  c.beginPath();c.ellipse(0,0,25,17,0,0,Math.PI*2);c.fill();
  // lighter blue accent
  c.fillStyle='#42A5F5';
  c.beginPath();c.ellipse(-2,-5,18,8,0.1,0,Math.PI*2);c.fill();
  // dorsal fin
  c.fillStyle='#0D47A1';
  c.beginPath();c.moveTo(-8,-16);c.lineTo(10,-16);c.lineTo(8,-8);c.lineTo(-6,-8);c.closePath();c.fill();
  // anal fin
  c.fillStyle='#0D47A1';
  c.beginPath();c.moveTo(-5,15);c.lineTo(8,15);c.lineTo(6,9);c.lineTo(-3,9);c.closePath();c.fill();
  // lateral stripe
  c.strokeStyle='#0D47A1';c.lineWidth=2.5;
  c.beginPath();c.moveTo(-22,0);c.lineTo(22,0);c.stroke();
  // eye
  c.fillStyle='#FFF';c.beginPath();c.arc(-16,-5,6,0,Math.PI*2);c.fill();
  c.fillStyle='#1A237E';c.beginPath();c.arc(-15,-5,3.5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-14,-6,1.4,0,Math.PI*2);c.fill();
  // tail spine (signature feature)
  c.strokeStyle='#FFF';c.lineWidth=2;
  c.beginPath();c.moveTo(22,-5);c.lineTo(28,-10);c.stroke();
}

function drawAngelfish(c) {
  // trailing fins (long streamers)
  c.fillStyle='rgba(176,190,197,.7)';
  c.beginPath();c.moveTo(10,-8);c.lineTo(22,-35);c.lineTo(5,-8);c.closePath();c.fill();
  c.beginPath();c.moveTo(10,8);c.lineTo(22,35);c.lineTo(5,8);c.closePath();c.fill();
  // tail fin
  c.fillStyle='#90A4AE';
  c.beginPath();c.moveTo(16,0);c.lineTo(28,-12);c.lineTo(28,12);c.closePath();c.fill();
  // body (tall diamond shape)
  c.fillStyle='#CFD8DC';
  c.beginPath();
  c.moveTo(-20,0);c.lineTo(0,-22);c.lineTo(16,0);c.lineTo(0,22);c.closePath();c.fill();
  // black vertical stripes
  c.fillStyle='#212121';
  c.beginPath();c.moveTo(-8,-19);c.lineTo(-2,-20);c.lineTo(-2,20);c.lineTo(-8,19);c.closePath();c.fill();
  c.beginPath();c.moveTo(4,-15);c.lineTo(9,-13);c.lineTo(9,13);c.lineTo(4,15);c.closePath();c.fill();
  // head/face stripe (through eye)
  c.beginPath();c.moveTo(-20,0);c.lineTo(-14,-8);c.lineTo(-10,-6);c.lineTo(-10,6);c.lineTo(-14,8);c.closePath();c.fill();
  // eye
  c.fillStyle='#FFF';c.beginPath();c.arc(-15,-3,5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFD600';c.beginPath();c.arc(-14,-3,3.5,0,Math.PI*2);c.fill();
  c.fillStyle='#111';c.beginPath();c.arc(-14,-3,2,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-13,-4,1,0,Math.PI*2);c.fill();
  // outline
  c.strokeStyle='#546E7A';c.lineWidth=1.2;
  c.beginPath();c.moveTo(-20,0);c.lineTo(0,-22);c.lineTo(16,0);c.lineTo(0,22);c.closePath();c.stroke();
}

function drawStarfish(c) {
  // 5 arms
  const arms=5;
  c.fillStyle='#FF5722';
  c.beginPath();
  for(let i=0;i<arms;i++){
    const a=(Math.PI*2/arms)*i - Math.PI/2;
    const ai=a+Math.PI/arms;
    c.lineTo(Math.cos(a)*26,Math.sin(a)*26);
    c.lineTo(Math.cos(ai)*10,Math.sin(ai)*10);
  }
  c.closePath();c.fill();
  // texture dots
  c.fillStyle='#FF8A65';
  for(let i=0;i<arms;i++){
    const a=(Math.PI*2/arms)*i - Math.PI/2;
    for(let r=6;r<=22;r+=7){
      c.beginPath();c.arc(Math.cos(a)*r,Math.sin(a)*r,2.5,0,Math.PI*2);c.fill();
    }
  }
  // center circle
  c.fillStyle='#FF7043';
  c.beginPath();c.arc(0,0,8,0,Math.PI*2);c.fill();
  c.fillStyle='#FFAB91';
  c.beginPath();c.arc(0,0,4,0,Math.PI*2);c.fill();
  // outline
  c.strokeStyle='#BF360C';c.lineWidth=1.5;
  c.beginPath();
  for(let i=0;i<arms;i++){
    const a=(Math.PI*2/arms)*i - Math.PI/2;
    const ai=a+Math.PI/arms;
    c.lineTo(Math.cos(a)*26,Math.sin(a)*26);
    c.lineTo(Math.cos(ai)*10,Math.sin(ai)*10);
  }
  c.closePath();c.stroke();
}

function drawCrab(c) {
  // walking legs (behind body)
  c.strokeStyle='#B71C1C';c.lineWidth=3;c.lineCap='round';
  [[-8,12],[-2,14],[4,14],[10,12]].forEach(([lx,ly])=>{
    c.beginPath();c.moveTo(lx,8);c.lineTo(lx+3,ly+10);c.stroke();
    c.beginPath();c.moveTo(lx,8);c.lineTo(lx-3,ly+10);c.stroke();
  });
  // shell/body
  const bg=c.createRadialGradient(-3,-3,2,0,0,20);
  bg.addColorStop(0,'#EF5350');bg.addColorStop(1,'#C62828');
  c.fillStyle=bg;
  c.beginPath();c.ellipse(0,3,22,17,0,0,Math.PI*2);c.fill();
  // shell pattern lines
  c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=1.5;
  for(let i=0;i<4;i++){
    c.beginPath();c.arc(0,3,7+i*4,-Math.PI*0.6,Math.PI*0.6);c.stroke();
  }
  // big left claw
  c.fillStyle='#D32F2F';
  c.beginPath();c.ellipse(-28,0,14,9,0.3,0,Math.PI*2);c.fill();
  c.beginPath();c.moveTo(-20,-3);c.lineTo(-15,2);c.lineTo(-20,5);c.closePath();c.fill();
  c.strokeStyle='#B71C1C';c.lineWidth=2;
  c.beginPath();c.ellipse(-28,0,14,9,0.3,0,Math.PI*2);c.stroke();
  // arm to left claw
  c.strokeStyle='#C62828';c.lineWidth=6;c.lineCap='round';
  c.beginPath();c.moveTo(-20,0);c.lineTo(-14,2);c.stroke();
  // big right claw
  c.fillStyle='#D32F2F';
  c.beginPath();c.ellipse(28,0,14,9,-0.3,0,Math.PI*2);c.fill();
  c.beginPath();c.moveTo(20,-3);c.lineTo(15,2);c.lineTo(20,5);c.closePath();c.fill();
  c.strokeStyle='#B71C1C';c.lineWidth=2;
  c.beginPath();c.ellipse(28,0,14,9,-0.3,0,Math.PI*2);c.stroke();
  // arm to right claw
  c.strokeStyle='#C62828';c.lineWidth=6;c.lineCap='round';
  c.beginPath();c.moveTo(20,0);c.lineTo(14,2);c.stroke();
  // eye stalks
  c.strokeStyle='#B71C1C';c.lineWidth=3;
  c.beginPath();c.moveTo(-8,-15);c.lineTo(-10,-25);c.stroke();
  c.beginPath();c.moveTo(8,-15);c.lineTo(10,-25);c.stroke();
  c.fillStyle='#111';c.beginPath();c.arc(-10,-26,5,0,Math.PI*2);c.fill();
  c.fillStyle='#111';c.beginPath();c.arc(10,-26,5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-9,-27,2,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(11,-27,2,0,Math.PI*2);c.fill();
  // outline
  c.strokeStyle='#7F0000';c.lineWidth=1.5;
  c.beginPath();c.ellipse(0,3,22,17,0,0,Math.PI*2);c.stroke();
}

function drawShark(c) {
  // tail (crescent)
  c.fillStyle='#546E7A';
  c.beginPath();c.moveTo(30,0);c.lineTo(48,-18);c.lineTo(40,0);c.lineTo(48,12);c.closePath();c.fill();
  // body
  c.fillStyle='#607D8B';
  c.beginPath();c.ellipse(0,0,34,13,0,0,Math.PI*2);c.fill();
  // white belly
  c.fillStyle='#ECEFF1';
  c.beginPath();c.ellipse(0,7,27,7,0,0,Math.PI*2);c.fill();
  // dorsal fin
  c.fillStyle='#546E7A';
  c.beginPath();c.moveTo(2,-12);c.lineTo(12,-30);c.lineTo(18,-12);c.closePath();c.fill();
  // pectoral fin
  c.fillStyle='#455A64';
  c.beginPath();c.moveTo(-4,6);c.lineTo(-16,24);c.lineTo(10,12);c.closePath();c.fill();
  // gill slits
  c.strokeStyle='#37474F';c.lineWidth=1.5;
  for(let i=0;i<3;i++){
    c.beginPath();c.arc(-10+i*6,-1,8,-0.6,0.6);c.stroke();
  }
  // eye
  c.fillStyle='#1A1A1A';c.beginPath();c.arc(-23,-4,4.5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-22,-5,1.5,0,Math.PI*2);c.fill();
  // teeth (bottom row)
  c.fillStyle='#FFF';
  for(let i=0;i<5;i++){
    c.beginPath();c.moveTo(-20+i*5,8);c.lineTo(-17+i*5,15);c.lineTo(-14+i*5,8);c.closePath();c.fill();
  }
  // snout outline
  c.strokeStyle='#37474F';c.lineWidth=1.5;
  c.beginPath();c.ellipse(0,0,34,13,0,0,Math.PI*2);c.stroke();
}

function drawSeahorse(c) {
  // drawn taller; use scale 0.8 externally
  // tail curl
  c.strokeStyle='#F57F17';c.lineWidth=8;c.lineCap='round';
  c.beginPath();
  c.moveTo(4,18);c.quadraticCurveTo(20,28,18,38);
  c.quadraticCurveTo(16,46,8,44);c.stroke();
  // body segments
  const segColors=['#F9A825','#FFB300','#FFA000','#FF8F00','#FF6F00'];
  for(let i=0;i<5;i++){
    c.fillStyle=segColors[i];
    c.beginPath();c.ellipse(0,i*8-4,10-i,5,0,0,Math.PI*2);c.fill();
    c.strokeStyle='#E65100';c.lineWidth=1;
    c.beginPath();c.ellipse(0,i*8-4,10-i,5,0,0,Math.PI*2);c.stroke();
  }
  // neck
  c.fillStyle='#FFB300';
  c.beginPath();c.ellipse(-3,-20,7,14,0.15,0,Math.PI*2);c.fill();
  // head
  c.fillStyle='#F9A825';
  c.beginPath();c.ellipse(-6,-32,10,8,0.3,0,Math.PI*2);c.fill();
  // snout
  c.fillStyle='#FFB300';
  c.beginPath();c.ellipse(-14,-35,8,4,0.2,0,Math.PI*2);c.fill();
  // coronet (crown)

  // dorsal fin (fan)
  c.fillStyle='rgba(255,213,79,.7)';

  c.strokeStyle='#F9A825';c.lineWidth=1;

function drawSeaTurtle(c) {

function drawJellyfish(c) {

function drawOctopus(c) {
  // 8 tentacles
  const tentacleColors=['#E53935','#EF5350','#C62828','#D32F2F','#E53935','#EF5350','#C62828','#D32F2F'];
  for(let i=0;i<8;i++){
    const startA=(Math.PI*2/8)*i;
    const ex=Math.cos(startA)*38;
    const ey=Math.sin(startA)*38;
    c.strokeStyle=tentacleColors[i];c.lineWidth=7-i%2;c.lineCap='round';
    c.beginPath();
    c.moveTo(Math.cos(startA)*15,Math.sin(startA)*15);
    c.quadraticCurveTo(Math.cos(startA)*26+Math.cos(startA+0.8)*12, Math.sin(startA)*26+Math.sin(startA+0.8)*12,ex,ey);
    c.stroke();
    // suckers
    c.fillStyle='#FFCDD2';
    for(let d=0.35;d<=0.9;d+=0.25){
      const sx=Math.cos(startA)*15*(1-d)+ex*d;
      const sy=Math.sin(startA)*15*(1-d)+ey*d;
      c.beginPath();c.arc(sx+Math.cos(startA+Math.PI/2)*3,sy+Math.sin(startA+Math.PI/2)*3,2.5,0,Math.PI*2);c.fill();
    }
  }
  // body (mantle)
  const og=c.createRadialGradient(-3,-5,3,0,0,20);
  og.addColorStop(0,'#EF9A9A');og.addColorStop(1,'#C62828');
  c.fillStyle=og;
  c.beginPath();c.ellipse(0,-5,20,22,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#B71C1C';c.lineWidth=1.5;
  c.beginPath();c.ellipse(0,-5,20,22,0,0,Math.PI*2);c.stroke();
  // eyes
  c.fillStyle='#FFF';c.beginPath();c.arc(-8,-8,7,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(8,-8,7,0,Math.PI*2);c.fill();
  c.fillStyle='#1A1A1A';c.beginPath();c.arc(-7,-8,4.5,0,Math.PI*2);c.fill();
  c.fillStyle='#1A1A1A';c.beginPath();c.arc(9,-8,4.5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-6,-9,1.8,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(10,-9,1.8,0,Math.PI*2);c.fill();
  // blush
  c.fillStyle='rgba(255,200,200,.4)';
  c.beginPath();c.ellipse(-10,-2,6,3,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(10,-2,6,3,0,0,Math.PI*2);c.fill();
}

  c.fillStyle='rgba(255,100,200,.2)';c.beginPath();c.ellipse(-6,-4,14,8,0,0,Math.PI*2);c.fill();
  // eyes
  c.fillStyle='#FFF';c.beginPath();c.arc(-18,-4,8,0,Math.PI*2);c.fill();
  c.fillStyle='#1A1A1A';c.beginPath();c.arc(-18,-4,5,0,Math.PI*2);c.fill();
  c.fillStyle='#FFF';c.beginPath();c.arc(-16,-6,2,0,Math.PI*2);c.fill();
  // beak
  c.fillStyle='#1A1A1A';c.beginPath();c.moveTo(-26,-2);c.lineTo(-32,0);c.lineTo(-26,2);c.closePath();c.fill();
  c.strokeStyle='#880E4F';c.lineWidth=1.5;
  c.beginPath();c.moveTo(-26,0);c.bezierCurveTo(-20,-18,14,-14,20,0);c.bezierCurveTo(14,14,-20,18,-26,0);c.closePath();c.stroke();
}

function gotoStage(idx){
  if(idx >= STAGES.length){
    // Game complete — prompt leaderboard name entry
    saveHighScore();
    document.getElementById('nm-score-val').textContent=score;
    document.getElementById('name-modal').style.display='flex';
    document.getElementById('nm-input').focus();
    return;
  }
  stageIdx=idx;
  stageCatches=0;
  stageSpecies=new Set();
  creatures.length=0; nets.length=0; powerups.length=0;
  combo=1; comboTimer=0; activeEffect=null; effectTimer=0; powerupSpawnTimer=0;
  netsUsed=0; stageFailTimer=0;
  if(_stageClearTimeout){clearTimeout(_stageClearTimeout);_stageClearTimeout=null;}
  bgFrom={...bgTo};
  bgTo={...STAGES[stageIdx].bg};
  bgT=0;
  spawnTimer=0;
  screen='intro';
  introTimer=0;
  // reset fishing state for fishing stages
  if(STAGES[stageIdx].type==='fishing'){
    FISH.state='idle'; FISH.tipY=0; FISH.creature=null;
    FISH.tension=0; FISH.biteTimer=0; FISH.biteCreature=null;
    FISH.cooldown=0; FISH.castsDone=0; FISH.caughtThisStage=0;
    FISH.breakAnim=0; FISH.successAnim=0;
    FISH.lineX=W/2;

    for(let i=0;i<5;i++) spawnFishingCreature();

/* ═══════════════════════════════════════════════════════════════════════════
   BACKGROUND + SCENERY DRAWING
   ═══════════════════════════════════════════════════════════════════════════ */
function lerpColor(a,b,t){
  const h=c=>{const n=parseInt(c.slice(1),16);return[n>>16,(n>>8)&0xFF,n&0xFF];};
  const [r1,g1,b1]=h(a), [r2,g2,b2]=h(b);
  const r=r=>Math.round(r1+(r2-r1)*t), g=g=>Math.round(g1+(g2-g1)*t), bl=b=>Math.round(b1+(b2-b1)*t);
  return `rgb(${r()},${g()},${bl()})`;
}

function drawBackground(){
  const top=lerpColor(bgFrom.top,bgTo.top,bgT);
  const mid=lerpColor(bgFrom.mid,bgTo.mid,bgT);
  const bot=lerpColor(bgFrom.bot,bgTo.bot,bgT);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,top); g.addColorStop(0.5,mid); g.addColorStop(1,bot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // light rays
  ctx.save();
  for(let i=0;i<5;i++){
    const rx=W*(i/5)+W/10+Math.sin(gameTime*0.003+i)*25;
    const rg=ctx.createLinearGradient(rx,0,rx+50,H*0.65);
    rg.addColorStop(0,'rgba(255,255,255,0.07)'); rg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=rg;
    ctx.beginPath();
    ctx.moveTo(rx-15,0);ctx.lineTo(rx+65,0);ctx.lineTo(rx+100,H*0.65);ctx.lineTo(rx-55,H*0.65);
    ctx.closePath();ctx.fill();
  }
  // bioluminescent particles (midnight zone and deeper)
  if(stageIdx>=2){
    ctx.fillStyle=`rgba(0,229,255,${0.03*(stageIdx-1)})`;
    for(let i=0;i<20;i++){
      const px=(Math.sin(gameTime*0.007+i*2.3)*0.5+0.5)*W;
      const py=(Math.sin(gameTime*0.009+i*1.7)*0.5+0.5)*H;
      ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

function drawSeabed(){
  const sg=ctx.createLinearGradient(0,H-85,0,H);
  sg.addColorStop(0,'#9b8060'); sg.addColorStop(1,'#5a3e28');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.moveTo(0,H-55);
  for(let x=0;x<=W;x+=22) ctx.lineTo(x,H-55+Math.sin(x*0.038+gameTime*0.008)*9);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
}

function drawSeaweeds(){
  seaweeds.forEach(sw=>{
    const segH=17;
    ctx.lineWidth=sw.thick; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.strokeStyle=`hsl(${sw.hue},62%,28%)`;
    ctx.beginPath();
    let sx=sw.x, sy=H-64; ctx.moveTo(sx,sy);
    for(let i=0;i<sw.segs;i++){
      sx+=Math.sin(gameTime*0.016+sw.phase+i*0.6)*14; sy-=segH;
      ctx.lineTo(sx,sy);
    }

function drawBubbles(){

    b.y-=b.speed;

function drawCorals(){
  corals.forEach(co=>{
    const by=H-60;
    ctx.save(); ctx.translate(co.x,by); ctx.scale(co.sc,co.sc);
    if(co.type===0){
      function branch(x,y,len,ang,dep){
        if(dep===0||len<4)return;
        const ex=x+Math.cos(ang)*len, ey=y-Math.sin(ang)*len;
        ctx.strokeStyle=`hsl(${co.hue},75%,${30+dep*8}%)`;
        ctx.lineWidth=dep*2; ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.stroke();
        branch(ex,ey,len*.62,ang+0.5,dep-1); branch(ex,ey,len*.62,ang-0.5,dep-1);
      }
      branch(0,0,28,Math.PI/2,4);
    } else if(co.type===1){
      for(let i=0;i<6;i++){
        const bx=(i%3-1)*12, by2=-Math.floor(i/3)*14-8;
        ctx.fillStyle=`hsl(${co.hue+i*5},72%,48%)`;
        ctx.beginPath();ctx.arc(bx,by2,9,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.3)';
        ctx.beginPath();ctx.arc(bx-2,by2-2,3,0,Math.PI*2);ctx.fill();
      }
    } else {
      for(let i=-4;i<=4;i++){
        const sw=Math.sin(gameTime*0.02+i*.3)*5;
        ctx.strokeStyle=`hsl(${co.hue+i*3},68%,44%)`;ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(0,0);
        ctx.quadraticCurveTo(i*8+sw,-20,i*12+sw,-40);ctx.stroke();
      }
    }
    ctx.restore();
  });
}

  ctx.fillStyle='#a0d4f5';ctx.beginPath();ctx.arc(72,0,15,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(67,-4,4,0,Math.PI*2);ctx.fill();

function fireNet(){
  const stage=STAGES[stageIdx];
  if(stage.type==='cannon' && netsUsed>=stage.netQuota) return;
  cannon.recoil=1;
  netsUsed++;
  const tip=74;
  const maxR=activeEffect==='wideNet'?Math.round(CFG.netMaxRadius*1.72):CFG.netMaxRadius;
  nets.push({
    x:cannon.x+Math.cos(cannon.angle)*tip,
    y:cannon.y+Math.sin(cannon.angle)*tip,
    dx:Math.cos(cannon.angle)*CFG.netSpeed,
    dy:Math.sin(cannon.angle)*CFG.netSpeed,
    r:6, maxR, age:0, maxAge:CFG.netLifetime, rot:0, active:true,
  });
}

function drawNet(n){
  ctx.save(); ctx.translate(n.x,n.y); ctx.rotate(n.rot);
  const alpha=Math.max(0,1-n.age/n.maxAge);
  // spokes
  ctx.strokeStyle=`rgba(255,215,60,${alpha*.8})`;ctx.lineWidth=1.8;
  for(let i=0;i<8;i++){
    const a=(Math.PI*2/8)*i;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*n.r,Math.sin(a)*n.r);ctx.stroke();
  }
  // rings
  for(let ri=1;ri<=3;ri++){
    ctx.strokeStyle=`rgba(255,215,60,${alpha*.65})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,0,(n.r/3)*ri,0,Math.PI*2);ctx.stroke();
  }
  // outer glow
  ctx.strokeStyle=`rgba(255,240,120,${alpha*.3})`;ctx.lineWidth=6;
  ctx.beginPath();ctx.arc(0,0,n.r,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=`rgba(255,210,0,${alpha})`;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,0,n.r,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════════════════
   PARTICLES + POPUPS
   ═══════════════════════════════════════════════════════════════════════════ */
const PARTY=['#FFD700','#FF6B6B','#4ECDC4','#A8E6CF','#FFB347','#DDA0DD','#87CEEB'];

function burst(x,y,n=18){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.3, spd=Math.random()*5+2;
    particles.push({x,y,dx:Math.cos(a)*spd,dy:Math.sin(a)*spd-1,
      life:1,decay:.024+Math.random()*.02,size:Math.random()*9+4,
      color:PARTY[Math.floor(Math.random()*PARTY.length)],star:Math.random()<.45});
  }
}

function drawStar5(x,y,r,color,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2-Math.PI/2, ai=a+Math.PI/5;
    ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(ai)*r*.4,y+Math.sin(ai)*r*.4);
  }
  ctx.closePath();ctx.fill();ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;
    if(p.star) drawStar5(p.x,p.y,p.size,p.color,p.life);
    else{
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   CREATURE SPAWNING + DRAWING
   ═══════════════════════════════════════════════════════════════════════════ */
function pickCreature(){
  const stage=STAGES[stageIdx];
  const pool=stage.pool.map(id=>CREATURES.find(c=>c.id===id)).filter(Boolean);
  // weighted by rarity
  const total=pool.reduce((s,cr)=>s+CFG.weights[cr.rarity],0);
  let r=Math.random()*total;
  for(const cr of pool){ r-=CFG.weights[cr.rarity]; if(r<=0)return cr; }
  return pool[pool.length-1];
}

function spawnCreature(){
  if(creatures.filter(c=>!c.captured).length>=CFG.maxOnScreen) return;
  const def=pickCreature();
  const left=Math.random()<.5;
  const depth=.14+Math.random()*.62;
  const spd=def.baseSpeed*(STAGES[stageIdx].speedMult||1)*(1+Math.random()*.3-.15);
  creatures.push({
    ...def, x:left?-100:W+100, y:H*depth,
    dx:left?spd:-spd, dy:(Math.random()-.5)*.55,
    phase:Math.random()*Math.PI*2,
    wobbleAmp:Math.random()*5+2, wobbleSpeed:Math.random()*.04+.02,
    captured:false, captureT:0, id2:Math.random(),
  });
}

// For fishing stages: spawn creatures already on-screen so they're visible immediately
function spawnFishingCreature(){
  if(creatures.filter(c=>!c.captured).length>=CFG.maxOnScreen) return;
  const def=pickCreature();
  const goLeft=Math.random()<.5;
  const spd=def.baseSpeed*(STAGES[stageIdx].speedMult||1)*(1+Math.random()*.25-.12);
  // spread fish across visible screen width and below the boat (y > 110)
  const xPos=W*0.08+Math.random()*W*0.84;
  const depth=0.18+Math.random()*.52;
  creatures.push({
    ...def, x:xPos, y:H*depth,
    dx:goLeft?-spd:spd, dy:(Math.random()-.5)*.55,
    phase:Math.random()*Math.PI*2,
    wobbleAmp:Math.random()*5+2, wobbleSpeed:Math.random()*.04+.02,
    captured:false, captureT:0, id2:Math.random(),
  });
}

function drawCreatureOnScreen(c){
  ctx.save();
  ctx.translate(c.x,c.y);
  if(c.captured){
    const p=c.captureT/45;
    ctx.rotate(p*Math.PI*3); ctx.scale(1-p,1-p); ctx.globalAlpha=1-p;
  } else {
    ctx.translate(0, Math.sin(gameTime*c.wobbleSpeed+c.phase)*c.wobbleAmp);
    if(c.dx>0 && !c.noFlip) ctx.scale(-1,1);
  }
  ctx.scale(c.scale,c.scale);
  c.draw(ctx);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════════════════
   COLLISION DETECTION
   ═══════════════════════════════════════════════════════════════════════════ */
function checkCollisions(){
  for(const net of nets){
    if(!net.active) continue;
    // powerup collection
    for(let pi=powerups.length-1;pi>=0;pi--){
      const pu=powerups[pi];
      if(!pu.active) continue;
      const pdx=net.x-pu.x, pdy=net.y-pu.y;
      if(Math.sqrt(pdx*pdx+pdy*pdy)<net.r+22){
        pu.active=false; net.active=false;
        activeEffect=pu.def.id; effectTimer=pu.def.duration;
        burst(pu.x,pu.y,14);
        popups.push({x:pu.x,y:pu.y-36,text:pu.def.label,color:pu.def.color,life:1,size:28,dy:-2});
        break;
      }
    }
    if(!net.active) continue;
    // creature collection
    for(const cr of creatures){
      if(cr.captured) continue;
      const dx=net.x-cr.x, dy=net.y-cr.y;
      if(Math.sqrt(dx*dx+dy*dy) < net.r+cr.scale*30){
        cr.captured=true; net.active=false;
        // combo
        if(comboTimer>0) combo=Math.min(5,combo+1); else combo=1;
        comboTimer=COMBO_DURATION;
        const mult=combo*(activeEffect==='doublePoints'?2:1);
        const earned=cr.pts*mult;
        score+=earned; totalCatches++; stageCatches++; stageSpecies.add(cr.id);
        saveHighScore();
        // update collection
        const isNew=collection[cr.id].count===0;
        collection[cr.id].count++;
        if(!collection[cr.id].firstStage) collection[cr.id].firstStage=STAGES[stageIdx].id;
        saveCollection();
        burst(cr.x,cr.y);
        const comboStr=combo>1?` ×${combo}`:'';
        popups.push({
          x:cr.x, y:cr.y-36,
          text:`+${earned}${comboStr}${isNew?' 🆕':''}`,
          color:isNew?'#FFD700':RARITY_COLOR[cr.rarity],
          life:1, size:34, dy:-2.2,
        });
        // check stage challenge (guard against multiple queued timeouts)
        if(!_stageClearTimeout && STAGES[stageIdx].challenge.check({stageCatches,stageSpecies})){
          _stageClearTimeout=setTimeout(()=>{screen='stageClear';_stageClearTimeout=null;},600);
        }
      }
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   HUD DRAWING
   ═══════════════════════════════════════════════════════════════════════════ */
function drawHUD(){
  const stage=STAGES[stageIdx];
  const prog=stage.challenge.progress({stageCatches,stageSpecies});

  // top bar backdrop
  ctx.fillStyle='rgba(0,10,30,.55)';
  ctx.beginPath();ctx.roundRect(0,0,W,70,0);ctx.fill();

  // stage name (center)
  ctx.fillStyle='#7ee8ff';
  ctx.font='bold 22px Comic Sans MS,cursive';
  ctx.textAlign='center';
  ctx.shadowColor='rgba(0,180,255,.7)';ctx.shadowBlur=10;
  ctx.fillText(`Stage ${stageIdx+1}/${STAGES.length}: ${stage.name}`,W/2,30);
  ctx.shadowBlur=0;

  // score (right)
  ctx.fillStyle='#FFD700';
  ctx.font='bold 28px Comic Sans MS,cursive';
  ctx.textAlign='right';
  ctx.shadowColor='rgba(255,215,0,.6)';ctx.shadowBlur=8;
  ctx.fillText(`${score}`,W-20,36);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,220,100,.7)';
  ctx.font='12px Comic Sans MS,cursive';
  ctx.fillText('SCORE',W-20,50);
  if(highScore>0){
    ctx.fillStyle='rgba(200,175,60,.55)';
    ctx.font='11px Comic Sans MS,cursive';
    ctx.fillText(`BEST ${highScore}`,W-20,63);
  }
  // combo (below top bar)
  if(combo>1){
    const hue=Math.max(0,40-combo*8);
    const ct=`×${combo} COMBO!`;
    ctx.font=`bold ${17+combo}px Comic Sans MS,cursive`;
    const cw2=ctx.measureText(ct).width+24;
    ctx.fillStyle='rgba(0,5,20,.72)';
    ctx.beginPath();ctx.roundRect(W-cw2-8,72,cw2,28,14);ctx.fill();
    ctx.fillStyle=`hsl(${hue},100%,62%)`;
    ctx.textAlign='right';
    ctx.shadowColor=`hsl(${hue},100%,38%)`;ctx.shadowBlur=10;
    ctx.fillText(ct,W-16,91);
    ctx.shadowBlur=0;
  }

  // nets remaining (bottom-left)
  const netsLeft=stage.netQuota-netsUsed;
  const netColor=netsLeft<=5?'#FF5252':netsLeft<=10?'#FF9800':'rgba(200,240,255,.85)';
  ctx.fillStyle=netColor;
  ctx.font='bold 14px Comic Sans MS,cursive';
  ctx.textAlign='left';
  ctx.fillText(`🎯 ${netsLeft} nets left`,10,H-16);

  // challenge progress (left of center)
  ctx.textAlign='left';
  ctx.fillStyle='rgba(200,240,255,.85)';
  ctx.font='13px Comic Sans MS,cursive';
  ctx.fillText(stage.challenge.desc, 80, 22);

  // progress bar
  const barX=80, barY=32, barW=Math.min(380,W*.4), barH=14;
  const pct=Math.min(1, prog.cur/prog.max);
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,7);ctx.fill();
  const barGrad=ctx.createLinearGradient(barX,0,barX+barW,0);
  barGrad.addColorStop(0,'#4fc3f7'); barGrad.addColorStop(1,'#0288d1');
  ctx.fillStyle=barGrad;
  ctx.beginPath();ctx.roundRect(barX,barY,barW*pct,barH,7);ctx.fill();
  ctx.strokeStyle='rgba(150,220,255,.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,7);ctx.stroke();

  if(prog.sub){
    ctx.fillStyle='rgba(200,240,255,.7)';
    ctx.font='12px Comic Sans MS,cursive';
    ctx.fillText(prog.sub, barX, barY+barH+14);
  }

  // popups
  popups.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;
    ctx.font=`bold ${p.size}px Comic Sans MS,cursive`;
    ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=4;
    ctx.strokeText(p.text,p.x,p.y);
    ctx.fillStyle=p.color;ctx.fillText(p.text,p.x,p.y);
    ctx.restore();
  });

  // active effect indicator (bottom-right)
  if(activeEffect&&effectTimer>0){
    const eDef=POWERUP_TYPES.find(p=>p.id===activeEffect);
    if(eDef){
      const bx=W-172, by=H-64, bw=160, bh=52;
      ctx.fillStyle='rgba(0,8,25,.78)';
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();
      ctx.strokeStyle=eDef.color;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();
      ctx.fillStyle=eDef.color;
      ctx.font='bold 14px Comic Sans MS,cursive';
      ctx.textAlign='center';
      ctx.fillText(`${eDef.icon} ${eDef.label}`,bx+bw/2,by+22);
      ctx.fillStyle='rgba(255,255,255,.12)';
      ctx.beginPath();ctx.roundRect(bx+8,by+30,bw-16,9,4);ctx.fill();
      const pct2=effectTimer/eDef.duration;
      ctx.fillStyle=eDef.color;
      ctx.beginPath();ctx.roundRect(bx+8,by+30,(bw-16)*pct2,9,4);ctx.fill();
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   POKÉDEX UI  (canvas overlay)
   ═══════════════════════════════════════════════════════════════════════════ */
const DEX_COLS=4;
const CARD_W=148, CARD_H=170, CARD_PAD=12;
const DEX_FILTERS=['all','common','uncommon','rare','epic','legendary'];

function dexFilteredCreatures(){
  return CREATURES.filter(cr=>dexFilter==='all'||cr.rarity===dexFilter);
}

function drawPokédex(){
  const panW=Math.min(W*.92,720), panH=Math.min(H*.92,620);
  const panX=(W-panW)/2, panY=(H-panH)/2;
  const cols=window.innerWidth<500?2:DEX_COLS;
  const cw=(panW-CARD_PAD*(cols+1))/cols;
  const ch=CARD_H;

  ctx.save();
  // overlay
  ctx.fillStyle='rgba(0,5,20,.88)';ctx.fillRect(0,0,W,H);
  // panel
  ctx.fillStyle='rgba(0,20,50,.97)';
  ctx.beginPath();ctx.roundRect(panX,panY,panW,panH,18);ctx.fill();
  ctx.strokeStyle='rgba(100,180,255,.35)';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(panX,panY,panW,panH,18);ctx.stroke();

  // title bar
  const titleH=52;
  ctx.fillStyle='rgba(0,40,80,.8)';
  ctx.beginPath();ctx.roundRect(panX,panY,panW,titleH,{tl:18,tr:18,bl:0,br:0});ctx.fill();
  ctx.fillStyle='#7ee8ff';
  ctx.font='bold 24px Comic Sans MS,cursive';
  ctx.textAlign='left';
  ctx.shadowColor='rgba(0,200,255,.7)';ctx.shadowBlur=10;
  ctx.fillText('🌊 Ocean Dex',panX+18,panY+34);
  ctx.shadowBlur=0;
  // caught count
  const caughtN=CREATURES.filter(cr=>collection[cr.id].count>0).length;
  ctx.fillStyle='#FFD700';
  ctx.font='bold 18px Comic Sans MS,cursive';
  ctx.textAlign='right';
  ctx.fillText(`${caughtN} / ${CREATURES.length} Caught`,panX+panW-60,panY+34);
  // close button
  const closeX=panX+panW-38, closeY=panY+10, closeR=16;
  ctx.fillStyle='rgba(255,80,80,.8)';
  ctx.beginPath();ctx.arc(closeX+closeR,closeY+closeR,closeR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 18px Comic Sans MS,cursive';ctx.textAlign='center';
  ctx.fillText('✕',closeX+closeR,closeY+closeR+6);
  dexCloseArea={x:closeX,y:closeY,w:closeR*2,h:closeR*2};

  // filter tabs
  const tabY=panY+titleH+6, tabH=30, tabGap=4;
  const tabW=(panW-CARD_PAD*2-tabGap*(DEX_FILTERS.length-1))/DEX_FILTERS.length;
  dexFilterBtns=[];
  DEX_FILTERS.forEach((f,i)=>{
    const tx=panX+CARD_PAD+i*(tabW+tabGap), ty=tabY;
    const active=dexFilter===f;
    ctx.fillStyle=active?RARITY_COLOR[f]||'#1E88E5':'rgba(255,255,255,.08)';
    ctx.beginPath();ctx.roundRect(tx,ty,tabW,tabH,6);ctx.fill();
    ctx.strokeStyle=active?'rgba(255,255,255,.5)':'rgba(255,255,255,.1)';
    ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(tx,ty,tabW,tabH,6);ctx.stroke();
    ctx.fillStyle='#FFF';ctx.font='bold 11px Comic Sans MS,cursive';ctx.textAlign='center';
    ctx.fillText(f.charAt(0).toUpperCase()+f.slice(1),tx+tabW/2,ty+tabH/2+4);
    dexFilterBtns.push({x:tx,y:ty,w:tabW,h:tabH,filter:f});
  });

  // grid area
  const gridY=tabY+tabH+10, gridH=panH-(gridY-panY)-10;
  ctx.save();
  ctx.beginPath();ctx.rect(panX,gridY,panW,gridH);ctx.clip();

  const filtered=dexFilteredCreatures();
  const rows=Math.ceil(filtered.length/cols);
  const totalGridH=rows*(ch+CARD_PAD)+CARD_PAD;
  dexMaxScroll=Math.max(0,totalGridH-gridH);
  dexScroll=Math.max(0,Math.min(dexScroll,dexMaxScroll));
  dexCards=[];

  filtered.forEach((cr,idx)=>{
    const col=idx%cols, row=Math.floor(idx/cols);
    const cx=panX+CARD_PAD+col*(cw+CARD_PAD);
    const cy=gridY+CARD_PAD+row*(ch+CARD_PAD)-dexScroll;
    if(cy+ch<gridY-20||cy>gridY+gridH+20) return; // cull
    const caught=collection[cr.id].count>0;
    const cnt=collection[cr.id].count;
    const stars=cnt===0?0:cnt<5?1:cnt<15?2:3;

    // card bg
    ctx.fillStyle=caught?`rgba(${hexToRgb(RARITY_COLOR[cr.rarity]||'#333')},0.18)`:'rgba(10,15,30,.8)';
    ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,10);ctx.fill();
    ctx.strokeStyle=caught?RARITY_COLOR[cr.rarity]:'rgba(100,130,180,.2)';
    ctx.lineWidth=caught?2:1;
    ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,10);ctx.stroke();

    // creature preview area
    const previewH=90, previewY=cy+8;
    ctx.save();
    ctx.beginPath();ctx.rect(cx+4,previewY,cw-8,previewH);ctx.clip();
    ctx.translate(cx+cw/2, previewY+previewH/2);
    ctx.scale(0.65,0.65);
    if(!caught){
      ctx.filter='grayscale(100%) brightness(10%)';ctx.globalAlpha=0.5;
    }
    cr.draw(ctx);
    ctx.restore();

    // rarity badge
    ctx.fillStyle=RARITY_COLOR[cr.rarity];
    ctx.font='bold 9px Comic Sans MS,cursive';
    ctx.textAlign='center';
    ctx.fillText(RARITY_LABEL[cr.rarity].toUpperCase(),cx+cw/2,cy+previewH+14);

    // name
    ctx.fillStyle=caught?'#FFF':'rgba(150,170,200,.5)';
    ctx.font=`bold 13px Comic Sans MS,cursive`;
    ctx.textAlign='center';
    ctx.fillText(caught?cr.name:'???',cx+cw/2,cy+previewH+30);

    // stars
    if(caught){
      ctx.font='16px serif';
      const starStr=(stars>=1?'⭐':'☆')+(stars>=2?'⭐':'☆')+(stars>=3?'⭐':'☆');
      ctx.fillText(starStr,cx+cw/2,cy+previewH+50);
      ctx.fillStyle='rgba(200,220,255,.7)';
      ctx.font='11px Comic Sans MS,cursive';
      ctx.fillText(`×${cnt} caught`,cx+cw/2,cy+previewH+66);
    } else {
      ctx.fillStyle='rgba(100,120,160,.5)';
      ctx.font='12px Comic Sans MS,cursive';
      ctx.fillText('Not caught yet',cx+cw/2,cy+previewH+52);
    }

    dexCards.push({x:cx,y:cy,w:cw,h:ch,cr});
  });

  ctx.restore();

  // scroll indicator
  if(dexMaxScroll>0){
    const trackH=gridH-10, trackX=panX+panW-14, trackY=gridY+5;
    ctx.fillStyle='rgba(255,255,255,.08)';
    ctx.beginPath();ctx.roundRect(trackX,trackY,6,trackH,3);ctx.fill();
    const thumbH=Math.max(30,(trackH/(dexMaxScroll+trackH))*trackH);
    const thumbY=trackY+(dexScroll/dexMaxScroll)*(trackH-thumbH);
    ctx.fillStyle='rgba(100,180,255,.5)';
    ctx.beginPath();ctx.roundRect(trackX,thumbY,6,thumbH,3);ctx.fill();
  }

  ctx.restore();
}

function hexToRgb(hex){
  const n=parseInt(hex.slice(1),16);
  return `${n>>16},${(n>>8)&0xFF},${n&0xFF}`;
}

      ctx.fillStyle=gold?'#FFD700':silver?'#C0C0C0':bronze?'#CD7F32':'#aaa';
      ctx.textAlign='left';

      // name
      ctx.fillStyle='#FFF';
      ctx.font='bold 20px Comic Sans MS,cursive';
      ctx.fillText(entry.name,lx+70,ry+rowH/2+8);
      // score
      ctx.fillStyle='#7ee8ff';
      ctx.font='bold 22px Comic Sans MS,cursive';
      ctx.textAlign='right';
      ctx.fillText(entry.score,lx+colW-100,ry+rowH/2+8);
      // date
      ctx.fillStyle='rgba(150,180,220,.6)';
      ctx.font='13px Comic Sans MS,cursive';

    });
  }
  // back button
  const bW=200,bH=50,bX=W/2-bW/2,bY=H-90;
  ctx.fillStyle='rgba(2,136,209,.85)';
  ctx.beginPath();ctx.roundRect(bX,bY,bW,bH,25);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 22px Comic Sans MS,cursive';ctx.textAlign='center';
  ctx.fillText('← Back',W/2,bY+34);
  _lbBackBtn={x:bX,y:bY,w:bW,h:bH};
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════════════════
   FISHING STAGE
   ═══════════════════════════════════════════════════════════════════════════ */
const BOAT_Y=60; // y of boat center
function drawFishingBoat(){
  const bx=FISH.lineX;
  // water surface ripple
  ctx.strokeStyle='rgba(100,200,255,.3)';ctx.lineWidth=2;
  ctx.beginPath();
  for(let x=0;x<W;x+=40){
    const wy=BOAT_Y+30+Math.sin(gameTime*.04+x*.05)*4;
    x===0?ctx.moveTo(x,wy):ctx.lineTo(x,wy);
  }
  ctx.stroke();

  // vertical aim guide — shows cast column while idle
  if(FISH.state==='idle'){
    const pulse=Math.sin(gameTime*.08)*.15+.25;
    ctx.fillStyle=`rgba(80,180,255,${pulse*0.18})`;
    ctx.fillRect(FISH.lineX-65,BOAT_Y+40,130,H-BOAT_Y-100);
    ctx.strokeStyle=`rgba(100,220,255,${pulse})`;
    ctx.lineWidth=1.2;ctx.setLineDash([7,5]);
    ctx.beginPath();ctx.moveTo(FISH.lineX,BOAT_Y+40);ctx.lineTo(FISH.lineX,H-60);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=`rgba(120,220,255,${pulse+.1})`;
    ctx.font='11px Comic Sans MS,cursive';ctx.textAlign='center';
    ctx.fillText('▼ cast zone ▼',FISH.lineX,H-42);
  }

  // hull
  ctx.fillStyle='#5D4037';
  ctx.beginPath();
  ctx.moveTo(bx-44,BOAT_Y+22);ctx.lineTo(bx+44,BOAT_Y+22);
  ctx.lineTo(bx+36,BOAT_Y+40);ctx.lineTo(bx-36,BOAT_Y+40);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#795548';
  ctx.fillRect(bx-44,BOAT_Y+16,88,10);
  // mast
  ctx.strokeStyle='#4E342E';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bx-8,BOAT_Y+18);ctx.lineTo(bx-8,BOAT_Y-30);ctx.stroke();
  // rod
  ctx.strokeStyle='#8D6E63';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(bx-8,BOAT_Y-28);ctx.lineTo(bx+30,BOAT_Y-10);ctx.stroke();
  const rodTipX=bx+30, rodTipY=BOAT_Y-10;

  // fishing line + hook (only when cast)
  if(FISH.state!=='idle'){
    const tension=FISH.tension;
    ctx.strokeStyle=tension>0.7?`rgba(255,${Math.round(200*(1-tension))},0,.9)`:'rgba(200,230,255,.75)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(rodTipX,rodTipY);
    const midX=rodTipX+(FISH.lineX-rodTipX)*0.5+Math.sin(gameTime*.03)*6*(1-tension);
    ctx.quadraticCurveTo(midX,FISH.tipY*0.5,FISH.lineX,FISH.tipY);
    ctx.stroke();
    // catch zone ellipse during sinking (shows actual hit area)
    if(FISH.state==='sinking'){
      const pulse=Math.sin(gameTime*.14)*.3+.7;
      ctx.strokeStyle=`rgba(100,230,255,${0.45*pulse})`;ctx.lineWidth=1.5;
      ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.ellipse(FISH.lineX,FISH.tipY,65,45,0,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    }
    // hook (gold when hooked)
    ctx.strokeStyle=FISH.state==='hooked'?'#FFD700':'#90A4AE';
    ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(FISH.lineX,FISH.tipY+6,7,-Math.PI*0.1,Math.PI*0.8);
    ctx.stroke();
    ctx.beginPath();ctx.moveTo(FISH.lineX-7,FISH.tipY+6);ctx.lineTo(FISH.lineX-10,FISH.tipY+2);ctx.stroke();
  }
}

function drawFishingHUD(){
  const stage=STAGES[stageIdx];
  const castsLeft=stage.castLimit-FISH.castsDone;
  // top bar
  ctx.fillStyle='rgba(0,10,30,.6)';
  ctx.beginPath();ctx.roundRect(0,0,W,70,0);ctx.fill();
  ctx.fillStyle='#7ee8ff';
  ctx.font='bold 22px Comic Sans MS,cursive';
  ctx.textAlign='center';
  ctx.shadowColor='rgba(0,180,255,.7)';ctx.shadowBlur=10;
  ctx.fillText(`Stage ${stageIdx+1}/${STAGES.length}: ${stage.name}`,W/2,30);
  ctx.shadowBlur=0;
  // score
  ctx.fillStyle='#FFD700';ctx.font='bold 28px Comic Sans MS,cursive';
  ctx.textAlign='right';ctx.shadowColor='rgba(255,215,0,.6)';ctx.shadowBlur=8;
  ctx.fillText(`${score}`,W-20,38);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,220,100,.7)';ctx.font='12px Comic Sans MS,cursive';
  ctx.fillText('SCORE',W-20,52);

  // casts remaining (left)
  ctx.textAlign='left';
  ctx.fillStyle='rgba(200,240,255,.9)';ctx.font='bold 16px Comic Sans MS,cursive';
  ctx.fillText(`🎣 Casts left: ${castsLeft}`,80,24);
  ctx.fillStyle='rgba(200,240,255,.7)';ctx.font='13px Comic Sans MS,cursive';
  ctx.fillText(`Caught: ${FISH.caughtThisStage}/${stage.catchTarget}`,80,44);

  // tension bar (when hooked)
  if(FISH.state==='hooked'){
    const bx=W/2-100,by=H-80,bw=200,bh=18;
    ctx.fillStyle='rgba(0,0,0,.6)';
    ctx.beginPath();ctx.roundRect(bx-2,by-2,bw+4,bh+4,10);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.12)';
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,9);ctx.fill();
    const tpct=FISH.tension;
    const tcol=tpct<0.5?`rgb(${Math.round(tpct*2*255)},220,0)`:`rgb(255,${Math.round((1-tpct)*2*220)},0)`;
    ctx.fillStyle=tcol;
    ctx.beginPath();ctx.roundRect(bx,by,bw*tpct,bh,9);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,9);ctx.stroke();
    ctx.fillStyle='#FFF';ctx.font='bold 14px Comic Sans MS,cursive';ctx.textAlign='center';
    ctx.fillText(`TENSION — TAP FAST!`,W/2,by-8);
    // reel prompt pulse
    const pulse=Math.sin(gameTime*.18)*.5+.5;
    ctx.fillStyle=`rgba(255,${Math.round(200*pulse)},0,${0.6+pulse*.4})`;
    ctx.font=`bold ${22+pulse*4}px Comic Sans MS,cursive`;
    ctx.fillText('🎣 REEL!',W/2,H-100);
  }

  // state prompts
  if(FISH.state==='idle'){
    if(castsLeft>0){
      const pulse=Math.sin(gameTime*.1)*.4+.6;
      ctx.fillStyle=`rgba(100,230,255,${pulse})`;
      ctx.font='bold 28px Comic Sans MS,cursive';ctx.textAlign='center';
      ctx.fillText('TAP TO CAST 🎣',W/2,H/2-10);
      ctx.fillStyle=`rgba(180,230,255,${pulse*.7})`;
      ctx.font='15px Comic Sans MS,cursive';
      ctx.fillText('Wait for a fish inside the blue column first!',W/2,H/2+22);
    }
  } else if(FISH.state==='sinking'){
    const pulse=Math.sin(gameTime*.14)*.4+.6;
    ctx.fillStyle=`rgba(150,220,255,${pulse})`;
    ctx.font='18px Comic Sans MS,cursive';ctx.textAlign='center';
    ctx.fillText('Hook dropping... 🎣',W/2,H-50);
  } else if(FISH.state==='break'){
    const a=Math.max(0,1-FISH.breakAnim/60);
    ctx.fillStyle=`rgba(255,80,80,${a})`;
    ctx.font='bold 36px Comic Sans MS,cursive';ctx.textAlign='center';
    ctx.shadowColor='rgba(255,0,0,.7)';ctx.shadowBlur=16;
    ctx.fillText('💥 LINE SNAPPED!',W/2,H/2-20);
    ctx.shadowBlur=0;
  } else if(FISH.state==='success'){
    const a=Math.max(0,1-FISH.successAnim/60);
    ctx.fillStyle=`rgba(100,255,150,${a})`;
    ctx.font='bold 36px Comic Sans MS,cursive';ctx.textAlign='center';
    ctx.shadowColor='rgba(0,255,100,.7)';ctx.shadowBlur=16;
    ctx.fillText('✅ CAUGHT!',W/2,H/2-20);
    ctx.shadowBlur=0;
  }

  // popups
  popups.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;
    ctx.font=`bold ${p.size}px Comic Sans MS,cursive`;
    ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=4;
    ctx.strokeText(p.text,p.x,p.y);
    ctx.fillStyle=p.color;ctx.fillText(p.text,p.x,p.y);
    ctx.restore();
  });
}

function updateFishing(){
  const stage=STAGES[stageIdx];
  const castsLeft=stage.castLimit-FISH.castsDone;

  // keep fish visible — spawn on-screen so they're always catchable
  if(creatures.filter(c=>!c.captured).length<4) spawnFishingCreature();

  // auto-check stage clear
  if(FISH.caughtThisStage>=stage.catchTarget && !_stageClearTimeout){
    _stageClearTimeout=setTimeout(()=>{screen='stageClear';_stageClearTimeout=null;},800);
  }
  // auto-fail if no casts left and not enough caught
  if(castsLeft<=0 && FISH.state==='idle' && FISH.caughtThisStage<stage.catchTarget && !_stageClearTimeout){
    _stageClearTimeout=setTimeout(()=>{screen='stageFail';stageFailTimer=0;_stageClearTimeout=null;},600);
  }

  if(FISH.cooldown>0){ FISH.cooldown--; return; }

  // while hooked: fish follows the hook (it's on the line)
  if(FISH.state==='hooked' && FISH.creature){
    FISH.creature.x+=(FISH.lineX-FISH.creature.x)*0.12;
    FISH.creature.y+=(FISH.tipY-FISH.creature.y)*0.14;
  }

  if(FISH.state==='sinking'){
    FISH.tipY+=FISH.sinkSpeed;
    // hook must physically reach the fish — needs proximity in BOTH x and y
    for(const cr of creatures){
      if(cr.captured) continue;
      if(cr.x<-40||cr.x>W+40) continue;
      const dx=cr.x-FISH.lineX;
      const dy=cr.y-FISH.tipY;
      if(Math.abs(dx)<65 && Math.abs(dy)<45){
        FISH.creature=cr;
        FISH.biteCreature=cr;
        FISH.state='hooked';
        FISH.tension=0;
        FISH.lastReelFrame=gameTime;
        FISH.tipY=cr.y;
        cr.dx=0; cr.dy=0;
        burst(FISH.lineX,cr.y,10);
        popups.push({x:FISH.lineX,y:cr.y-50,text:'HOOKED! 🎣',color:'#FFD700',life:1,size:32,dy:-1.5});
        break;
      }
    }
    // reached bottom — missed
    if(FISH.tipY>H-60){
      FISH.tipY=H-60;
      FISH.state='idle';
      FISH.castsDone++;
      FISH.biteCreature=null;
      FISH.cooldown=40;
      popups.push({x:W/2,y:H/2,text:'No fish there...',color:'#90A4AE',life:1,size:20,dy:-1.2});
    }
  } else if(FISH.state==='hooked'){
    // tension slowly falls when not reeling
    const framesSinceReel=gameTime-FISH.lastReelFrame;
    if(framesSinceReel>6) FISH.tension=Math.max(0,FISH.tension-0.003);
    // line break
    if(FISH.tension>=1.0){
      FISH.state='break';
      FISH.breakAnim=0;
      FISH.castsDone++;
      FISH.biteCreature=null;
      if(FISH.creature){ FISH.creature.captured=false; FISH.creature.dx=2; FISH.creature=null; }
      popups.push({x:W/2,y:H/2-80,text:'Line Snapped! 💥',color:'#FF5252',life:1,size:30,dy:-1.5});
    }
    // success: creature reaches boat
    if(FISH.tipY<=BOAT_Y+80){
      FISH.state='success';
      FISH.successAnim=0;
      FISH.castsDone++;
      if(FISH.creature){
        const cr=FISH.creature;
        const mult=combo*(activeEffect==='doublePoints'?2:1);
        const earned=cr.pts*mult;
        score+=earned; totalCatches++; stageCatches++; stageSpecies.add(cr.id);
        FISH.caughtThisStage++;
        saveHighScore();
        const isNew=collection[cr.id].count===0;
        collection[cr.id].count++;
        if(!collection[cr.id].firstStage) collection[cr.id].firstStage=stage.id;
        saveCollection();
        burst(W/2,BOAT_Y+50,20);
        popups.push({x:W/2,y:BOAT_Y+20,text:`+${earned}${isNew?' 🆕':''}`,color:isNew?'#FFD700':RARITY_COLOR[cr.rarity],life:1,size:34,dy:-2});
        cr.captured=true;
        FISH.creature=null;
      }
      FISH.biteCreature=null;
    }
  } else if(FISH.state==='break'){
    FISH.breakAnim++;
    if(FISH.breakAnim>80){ FISH.state='idle'; FISH.tension=0; FISH.cooldown=30; }
  } else if(FISH.state==='success'){
    FISH.successAnim++;
    if(FISH.successAnim>80){ FISH.state='idle'; FISH.tension=0; FISH.tipY=0; FISH.cooldown=30; }
  }
}

function fishingTap(){
  const stage=STAGES[stageIdx];
  const castsLeft=stage.castLimit-FISH.castsDone;
  if(FISH.cooldown>0) return;
  if(FISH.state==='idle'){
    if(castsLeft<=0) return;
    FISH.state='sinking';
    FISH.tipY=BOAT_Y+60;
    FISH.biteCreature=null;
    FISH.creature=null;
    FISH.tension=0;
  } else if(FISH.state==='hooked'){
    // reel: pull line up, increase tension
    FISH.tipY=Math.max(BOAT_Y+80,FISH.tipY-12);
    const cr=FISH.creature;
    const rate=cr?stage.tensionRate[cr.rarity]||0.02:0.02;
    FISH.tension=Math.min(1.0,FISH.tension+rate);
    FISH.lastReelFrame=gameTime;
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN LOOP
   ═══════════════════════════════════════════════════════════════════════════ */
function loop(){
  gameTime++;
  bgT=Math.min(1,bgT+0.02);

  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawSeaweeds();
  drawBubbles();
  drawCorals();
  drawSeabed();

  const currentStage=STAGES[stageIdx];
  const isFishing=currentStage&&currentStage.type==='fishing';

  if(screen==='menu'){
    drawMenuScreen();
  } else if(screen==='intro'){
    introTimer++;
    if(!isFishing) drawCannon();
    drawIntroScreen();
    if(introTimer>=INTRO_DURATION) screen=isFishing?'fishing':'playing';
  } else if(screen==='playing'){
    // timers
    if(comboTimer>0){comboTimer--;if(comboTimer===0)combo=1;}
    if(effectTimer>0){effectTimer--;}else{activeEffect=null;}
    // spawn creatures
    const si=Math.max(CFG.spawnMin, currentStage.spawnInterval - Math.floor(score/120)*4);
    if(++spawnTimer>=si){spawnCreature();spawnTimer=0;}
    // spawn powerups
    if(++powerupSpawnTimer>=POWERUP_SPAWN_INTERVAL){spawnPowerup();powerupSpawnTimer=0;}
    // update creatures
    const sf=activeEffect==='freeze'?0.25:1;
    for(let i=creatures.length-1;i>=0;i--){
      const c=creatures[i];
      if(c.captured){c.captureT++;if(c.captureT>45)creatures.splice(i,1);continue;}
      c.x+=c.dx*sf; c.y+=c.dy*sf;
      if(c.y<60)c.dy=Math.abs(c.dy); if(c.y>H-70)c.dy=-Math.abs(c.dy);
      if(c.x<-150||c.x>W+150)creatures.splice(i,1);
    }
    creatures.forEach(c=>drawCreatureOnScreen(c));
    // update + draw powerups
    for(let pi=powerups.length-1;pi>=0;pi--){
      const pu=powerups[pi];
      pu.x+=pu.dx+Math.sin(gameTime*0.022+pu.phase)*0.4;
      pu.y+=pu.dy;
      if(!pu.active||pu.y<-60){powerups.splice(pi,1);continue;}
      drawPowerup(pu);
    }
    // update nets
    for(let i=nets.length-1;i>=0;i--){
      const n=nets[i];
      if(n.active){
        n.x+=n.dx; n.y+=n.dy;
        n.r=Math.min(n.maxR,n.r+1.7);
        n.rot+=0.06; n.age++;
        if(n.age>CFG.netLifetime||n.y<-100||n.x<-100||n.x>W+100) n.active=false;
      }
      if(n.active) drawNet(n);
      else { n.age+=3; if(n.age>CFG.netLifetime+8) nets.splice(i,1); }
    }
    checkCollisions();
    // check net quota fail
    if(!_stageClearTimeout&&screen==='playing'){
      const netsLeft=currentStage.netQuota-netsUsed;
      const anyActive=nets.some(n=>n.active||n.age<=CFG.netLifetime+8);
      if(netsLeft<=0&&!anyActive&&!currentStage.challenge.check({stageCatches,stageSpecies})){
        _stageClearTimeout=setTimeout(()=>{
          if(screen==='playing'){screen='stageFail';stageFailTimer=0;}
          _stageClearTimeout=null;
        },500);
      }
    }
    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.dx; p.y+=p.dy; p.dy+=0.11; p.life-=p.decay;
      if(p.life<=0) particles.splice(i,1);
    }
    drawParticles();
    // popups
    for(let i=popups.length-1;i>=0;i--){
      const p=popups[i]; p.y+=p.dy; p.life-=0.021;
      if(p.life<=0) popups.splice(i,1);
    }
    drawCannon();
    drawHUD();

  } else if(screen==='fishing'){
    // spawn creatures for fishing stage — always on-screen
    const fsi=Math.max(CFG.spawnMin, currentStage.spawnInterval - Math.floor(score/120)*4);
    if(++spawnTimer>=fsi){spawnFishingCreature();spawnTimer=0;}
    for(let i=creatures.length-1;i>=0;i--){
      const c=creatures[i];
      if(c.captured){c.captureT++;if(c.captureT>45)creatures.splice(i,1);continue;}
      if(FISH.creature!==c){c.x+=c.dx;}
      if(c.y<90)c.dy=Math.abs(c.dy); if(c.y>H-70)c.dy=-Math.abs(c.dy);
      c.y+=c.dy;
      if(c.x<-160||c.x>W+160)creatures.splice(i,1);
    }
    creatures.forEach(c=>drawCreatureOnScreen(c));
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.x+=p.dx;p.y+=p.dy;p.dy+=0.11;p.life-=p.decay;
      if(p.life<=0)particles.splice(i,1);
    }
    drawParticles();
    for(let i=popups.length-1;i>=0;i--){
      const p=popups[i];p.y+=p.dy;p.life-=0.021;if(p.life<=0)popups.splice(i,1);
    }
    updateFishing();
    drawFishingBoat();
    drawFishingHUD();

  } else if(screen==='stageClear'){
    creatures.forEach(c=>drawCreatureOnScreen(c));
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.dx;p.y+=p.dy;p.dy+=0.1;p.life-=p.decay;
      if(p.life<=0)particles.splice(i,1);
    }
    drawParticles();
    if(!isFishing) drawCannon();
    drawStageClearScreen();

  } else if(screen==='stageFail'){
    if(!isFishing) drawCannon();
    drawStageFailScreen();

  } else if(screen==='leaderboard'){
    drawLeaderboard();
  }

  if(screen==='pokédex'){
    drawPokédex();
  }

  requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════════════════════════════════════
   INPUT HANDLERS
   ═══════════════════════════════════════════════════════════════════════════ */
function aimAt(cx,cy){
  let a=Math.atan2(cy-cannon.y,cx-cannon.x);
  a=Math.max(-Math.PI+0.14,Math.min(-0.14,a));
  cannon.angle=a;
}

canvas.addEventListener('mousemove',e=>{
  if(screen==='playing'||screen==='intro') aimAt(e.clientX,e.clientY);
});

function handleTap(cx,cy){
  if(screen==='menu'){
    if(_menuBtns){
      for(const btn of _menuBtns){
        if(cx>=btn.x&&cy>=btn.y&&cx<=btn.x+btn.w&&cy<=btn.y+btn.h){
          selectMode(btn.mode); return;
        }
      }
    }
    return;
  }
  if(screen==='pokédex'){
    if(dexCloseArea&&cx>=dexCloseArea.x&&cy>=dexCloseArea.y&&cx<=dexCloseArea.x+dexCloseArea.w&&cy<=dexCloseArea.y+dexCloseArea.h){
      screen=STAGES[stageIdx].type==='fishing'?'fishing':'playing'; return;
    }
    for(const btn of dexFilterBtns){
      if(cx>=btn.x&&cy>=btn.y&&cx<=btn.x+btn.w&&cy<=btn.y+btn.h){dexFilter=btn.filter;dexScroll=0;return;}
    }
    return;
  }
  if(screen==='leaderboard'){
    if(_lbBackBtn&&cx>=_lbBackBtn.x&&cy>=_lbBackBtn.y&&cx<=_lbBackBtn.x+_lbBackBtn.w&&cy<=_lbBackBtn.y+_lbBackBtn.h){
      screen='menu';
    }
    return;
  }
  if(screen==='stageClear'){
    const btn=ctx._stageClearBtn;
    if(btn&&stageClearTimer>60&&cx>=btn.x&&cy>=btn.y&&cx<=btn.x+btn.w&&cy<=btn.y+btn.h){
      stageClearTimer=0;
      if(stageIdx<STAGES.length-1) gotoStage(stageIdx+1);
      else { saveHighScore(); screen='menu'; }
    }
    return;
  }
  if(screen==='stageFail'){
    if(_stageFailBtn&&stageFailTimer>50){
      if(cx>=_stageFailBtn.retry.x&&cy>=_stageFailBtn.retry.y&&cx<=_stageFailBtn.retry.x+_stageFailBtn.retry.w&&cy<=_stageFailBtn.retry.y+_stageFailBtn.retry.h){
        retryStage(); return;
      }
      if(cx>=_stageFailBtn.quit.x&&cy>=_stageFailBtn.quit.y&&cx<=_stageFailBtn.quit.x+_stageFailBtn.quit.w&&cy<=_stageFailBtn.quit.y+_stageFailBtn.quit.h){
        screen='menu'; return;
      }
    }
    return;
  }
  if(screen==='intro'){
    if(introTimer>60){
      const isFish=STAGES[stageIdx].type==='fishing';
      screen=isFish?'fishing':'playing'; return;
    }
  }
  if(screen==='playing'){ aimAt(cx,cy); fireNet(); }
  if(screen==='fishing'){ fishingTap(); }
}

canvas.addEventListener('click',e=>{
  handleTap(e.clientX,e.clientY);
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  const cx=t.clientX, cy=t.clientY;
  if(screen==='pokédex'){
    if(dexCloseArea&&cx>=dexCloseArea.x&&cy>=dexCloseArea.y&&cx<=dexCloseArea.x+dexCloseArea.w&&cy<=dexCloseArea.y+dexCloseArea.h){
      screen=STAGES[stageIdx].type==='fishing'?'fishing':'playing'; return;
    }
    for(const btn of dexFilterBtns){
      if(cx>=btn.x&&cy>=btn.y&&cx<=btn.x+btn.w&&cy<=btn.y+btn.h){dexFilter=btn.filter;dexScroll=0;return;}
    }
    _dexTouchY=cy; return;
  }
  handleTap(cx,cy);
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  if(screen==='playing') aimAt(t.clientX,t.clientY);
  if(screen==='pokédex'){
    const delta=_dexTouchY-t.clientY;
    dexScroll=Math.max(0,Math.min(dexMaxScroll,dexScroll+delta));
    _dexTouchY=t.clientY;
  }
},{passive:false});

canvas.addEventListener('wheel',e=>{
  if(screen==='pokédex'){e.preventDefault();dexScroll=Math.max(0,Math.min(dexMaxScroll,dexScroll+e.deltaY*.6));}
},{passive:false});

window.addEventListener('keydown',e=>{
  if(e.code==='KeyP'){
    e.preventDefault();
    if(screen==='pokédex'){screen=STAGES[stageIdx].type==='fishing'?'fishing':'playing';}
    else{screen='pokédex';}
    if(screen==='pokédex') dexScroll=0;
  }
  if(screen==='playing'){
    if(e.code==='Space'||e.code==='Enter'){e.preventDefault();fireNet();}
    if(e.code==='ArrowLeft') cannon.angle=Math.max(-Math.PI+0.14,cannon.angle-0.07);
    if(e.code==='ArrowRight') cannon.angle=Math.min(-0.14,cannon.angle+0.07);
  }
  if(screen==='fishing'&&(e.code==='Space'||e.code==='Enter')){e.preventDefault();fishingTap();}
  if(screen==='intro'&&e.code==='Space'&&introTimer>60){
    const isFish=STAGES[stageIdx].type==='fishing';
    screen=isFish?'fishing':'playing';
  }
  if(screen==='stageClear'){
    const btn=ctx._stageClearBtn;
    if((e.code==='Space'||e.code==='Enter')&&btn&&stageClearTimer>60){
      stageClearTimer=0;
      if(stageIdx<STAGES.length-1) gotoStage(stageIdx+1);
      else { saveHighScore(); screen='menu'; }
    }
  }
  if(screen==='stageFail'&&e.code==='Space') retryStage();
  if(screen==='leaderboard'&&e.code==='Space'){screen='menu';}
});

document.getElementById('dex-btn').addEventListener('click',()=>{
  if(screen==='pokédex'){screen=STAGES[stageIdx].type==='fishing'?'fishing':'playing';}
  else{screen='pokédex';}
  if(screen==='pokédex') dexScroll=0;
});

document.getElementById('lb-btn').addEventListener('click',()=>{
  lbFromScreen=screen;
  screen='leaderboard';
});

// Name modal submit
function submitName(name){
  document.getElementById('name-modal').style.display='none';
  saveToLeaderboard(name.trim(),score);
  score=0; totalCatches=0;
  screen='leaderboard';
}
document.getElementById('nm-submit').addEventListener('click',()=>{
  submitName(document.getElementById('nm-input').value);
});
document.getElementById('nm-skip').addEventListener('click',()=>{
  document.getElementById('name-modal').style.display='none';
  score=0; totalCatches=0;
  screen='leaderboard';
});
document.getElementById('nm-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') submitName(document.getElementById('nm-input').value);
});

window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  cannon.x=W/2; cannon.y=H-58;
  FISH.lineX=W/2;
  bubbles.forEach(b=>{if(b.x>W)b.x=Math.random()*W;});
  seaweeds.forEach(sw=>{if(sw.x>W)sw.x=Math.random()*W;});
  corals.forEach(co=>{if(co.x>W)co.x=Math.random()*W;});
});

/* ═══════════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════════ */
loadCollection();
loadHighScore();
loadLeaderboard();
FISH.lineX=W/2;
// show leaderboard button after password unlock
function unlockUI(){
  document.getElementById('lb-btn').style.display='flex';
}
loop();
</script>
